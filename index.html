<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NMT SCADA</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div class="top">
    <div>
      <h1>מרכז בקרה NMT</h1>
      <div class="muted">כל 19 המערכות בדשבורד אחד + מפה עם מספרי מערכות בתוך עיגולים</div>
    </div>
    <div><small>תאריך</small><br><b id="today"></b></div>
  </div>

  <div class="kpi">
    <div class="k"><span>סה״כ</span><b>19</b></div>
    <div class="k"><span>תקינות</span><b class="g" id="ok">0</b></div>
    <div class="k"><span>תקולות</span><b class="r" id="bad">0</b></div>
    <div class="k"><span>מנותקות</span><b class="x" id="off">19</b></div>
    <div class="k"><span>לא עודכנו 14+ יום</span><b class="y" id="old">0</b></div>
  </div>

  <div class="tabs">
    <button class="active" data-v="dash">דשבורד</button>
    <button data-v="map">מפה</button>
    <button data-v="table">טבלה</button>
    <button data-v="report">דוחות</button>
  </div>

  <div class="bar">
    <input id="q" placeholder="חיפוש">
    <select id="flt">
      <option>הכל</option>
      <option>תקין</option>
      <option>תקול</option>
      <option>מנותק</option>
    </select>
    <button class="primary" id="csv">ייצוא CSV</button>
    <button id="prt">PDF</button>
    <button id="clr">איפוס</button>
  </div>

  <section id="dash" class="view active">
    <div class="dash" id="tiles"></div>
  </section>

  <section id="map" class="view">
    <div class="panel">
      <button class="primary" onclick="geocodeAll()">עדכן מיקומים לפי ערים</button>
      <button onclick="fitMap()">מרכז מפה</button>
      <div id="mapBox" style="margin-top:10px"></div>
      <div class="muted">במפה העיגולים נשארים כהים, ורק צבע המספר משתנה לפי הסטטוס.</div>
    </div>
  </section>

  <section id="table" class="view">
    <div class="panel tbl">
      <table>
        <thead>
          <tr>
            <th>מערכת</th>
            <th>עיר/כתובת</th>
            <th>מיקום</th>
            <th>סטטוס</th>
            <th>עדכון</th>
            <th>פירוט</th>
            <th>קישור</th>
            <th>פעולה</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </section>

  <section id="report" class="view">
    <div class="report">
      <div class="panel"><h2>מצב נוכחי</h2><div id="rep"></div></div>
      <div class="panel"><h2>היסטוריה</h2><div id="hist"></div></div>
    </div>
  </section>

  <div class="modal" id="modal">
    <div class="box">
      <div class="head">
        <h2 id="mt"></h2>
        <button onclick="closeM()">סגור</button>
      </div>
      <div class="form">
        <label>עיר/כתובת<input id="mcity" class="f"></label>
        <label>מיקום<input id="mloc" class="f"></label>
        <label>סטטוס<select id="mst" class="f"><option>מנותק</option><option>תקין</option><option>תקול</option></select></label>
        <label>תאריך<input id="mdate" class="f" type="date"></label>
        <label>קישור<input id="mfile" class="f"></label>
        <label>קואורדינטות<input id="mcoords" class="f" readonly></label>
        <label class="full">פירוט<textarea id="mdet" class="f" rows="3"></textarea></label>
        <div class="full">
          <button class="primary" onclick="saveM()">שמור</button>
          <button onclick="geoCurrent()">מצא על המפה</button>
        </div>
      </div>
      <h3>היסטוריה</h3>
      <div id="mhist"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
